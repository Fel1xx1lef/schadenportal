<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Schadenportal Schindelhauer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-wrapper">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z" fill="currentColor"/></svg>
      </div>
      <div class="sidebar-company">Schadenportal</div>
      <div class="sidebar-subtitle">Admin · Continentale</div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-label">Administration</div>
      <a href="javascript:void(0)" class="nav-item active" id="navCases">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>Alle Schadensfälle</span>
        <span id="openBadge" class="nav-badge hidden"></span>
      </a>
      <a href="javascript:void(0)" class="nav-item" id="navCustomers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Kundenverwaltung</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUser"></div>
      <button class="sidebar-logout" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Abmelden</span>
      </button>
    </div>
  </aside>

  <main class="main-content">

    <!-- TAB: CASES -->
    <div id="tab-cases">
      <div class="content-header">
        <div>
          <h1 class="page-title">Schadensfälle</h1>
          <p class="page-subtitle">Übersicht aller gemeldeten Schäden</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="filterStatus" class="form-control" style="width:auto;padding:8px 12px;font-size:13px">
            <option value="">Alle Status</option>
            <option value="offen">Offen</option>
            <option value="in_bearbeitung">In Bearbeitung</option>
            <option value="abgeschlossen">Abgeschlossen</option>
          </select>
          <select id="filterSparte" class="form-control" style="width:auto;padding:8px 12px;font-size:13px">
            <option value="">Alle Sparten</option>
            <option value="hausrat">Hausrat</option>
            <option value="wohngebaeude">Wohngebäude</option>
            <option value="haftpflicht">Haftpflicht</option>
            <option value="kfz">Kfz</option>
            <option value="glas">Glas</option>
          </select>
        </div>
      </div>
      <div id="casesContainer"></div>
    </div>

    <!-- TAB: CUSTOMERS -->
    <div id="tab-customers" style="display:none">
      <div class="content-header">
        <div>
          <h1 class="page-title">Kundenverwaltung</h1>
          <p class="page-subtitle">Zugänge anlegen und verwalten</p>
        </div>
        <button class="btn btn-primary" id="addCustomerBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Kunden anlegen
        </button>
      </div>
      <div id="customersContainer"></div>
    </div>
  </main>
</div>

<!-- Modal: Case Detail (Admin) -->
<div id="caseModal" class="modal-overlay hidden">
  <div class="modal" style="max-width:800px;width:95vw;max-height:90vh;overflow-y:auto">
    <div class="modal-header">
      <h3 class="modal-title" id="modalCaseTitle">Schadensfall</h3>
      <button class="modal-close" id="closeCaseModal">&times;</button>
    </div>
    <div class="modal-body">
      <!-- Case info bar -->
      <div id="modalCaseInfo" style="display:flex;gap:16px;flex-wrap:wrap;padding:12px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:20px;font-size:13px"></div>

      <!-- Status change -->
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap">
        <select id="modalStatusSelect" class="form-control" style="width:auto;padding:8px 12px;font-size:13px">
          <option value="offen">Offen</option>
          <option value="in_bearbeitung">In Bearbeitung</option>
          <option value="abgeschlossen">Abgeschlossen</option>
        </select>
        <button id="modalSaveStatus" class="btn btn-secondary" style="font-size:13px">Status speichern</button>
        <button id="modalNotifyBtn" class="btn" style="font-size:13px;background:#25d366;color:#fff;border-color:#25d366" title="Kunde benachrichtigen">
          Kunde benachrichtigen
        </button>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <!-- Timeline -->
        <div>
          <h4 style="font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px">Status-Timeline</h4>
          <div id="modalTimeline" style="margin-bottom:12px"></div>
          <textarea id="modalTimelineInput" class="form-control" rows="2" placeholder="Status-Update eintragen…" maxlength="1000"></textarea>
          <button id="modalAddTimeline" class="btn btn-primary" style="margin-top:8px;font-size:13px;width:100%">Update eintragen</button>
        </div>
        <!-- Docs + Messages -->
        <div style="display:flex;flex-direction:column;gap:16px">
          <div>
            <h4 style="font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Dokumente</h4>
            <div id="modalDocs" style="margin-bottom:8px"></div>
            <select id="modalDocType" class="form-control" style="margin-bottom:6px;font-size:13px">
              <option value="Rechnung">Rechnung</option>
              <option value="Kostenvoranschlag">Kostenvoranschlag</option>
              <option value="Prüfbericht">Prüfbericht</option>
              <option value="Abrechnung">Abrechnung</option>
              <option value="Schadenanzeige">Schadenanzeige</option>
              <option value="Schadenbilder">Schadenbilder</option>
              <option value="Sonstiges" selected>Sonstiges</option>
            </select>
            <label style="display:flex;align-items:center;gap:8px;padding:8px;border:2px dashed var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text-secondary);justify-content:center">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Dokument hochladen
              <input type="file" id="modalDocUpload" multiple accept=".jpg,.jpeg,.png,.webp,.pdf" style="display:none">
            </label>
          </div>
          <div>
            <h4 style="font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Nachrichten</h4>
            <div id="modalMessages" style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:8px"></div>
            <div style="display:flex;gap:8px">
              <input type="text" id="modalMsgInput" class="form-control" placeholder="Nachricht…" maxlength="2000" style="flex:1">
              <button id="modalSendMsg" class="btn btn-primary" style="flex-shrink:0;font-size:13px">Senden</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Add Customer -->
<div id="addCustomerModal" class="modal-overlay hidden">
  <div class="modal" style="max-width:480px;width:95vw">
    <div class="modal-header">
      <h3 class="modal-title">Kunden anlegen</h3>
      <button class="modal-close" onclick="closeModal('addCustomerModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div id="addCustError" class="alert alert-danger hidden" style="margin-bottom:16px"></div>
      <div class="form-group"><label class="form-label">Name *</label><input type="text" id="custName" class="form-control" placeholder="Max Mustermann"></div>
      <div class="form-group"><label class="form-label">E-Mail *</label><input type="email" id="custEmail" class="form-control" placeholder="max@beispiel.de"></div>
      <div class="form-group"><label class="form-label">Passwort * <span style="font-size:11px;color:var(--muted)">(mind. 12 Zeichen)</span></label><input type="password" id="custPassword" class="form-control"></div>
      <div class="form-group"><label class="form-label">Telefon</label><input type="tel" id="custPhone" class="form-control"></div>
      <div class="form-group"><label class="form-label">Mobil</label><input type="tel" id="custMobile" class="form-control"></div>
      <div class="form-group">
        <label class="form-label">Benachrichtigung</label>
        <select id="custNotif" class="form-control">
          <option value="email">E-Mail</option>
          <option value="whatsapp">WhatsApp</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="closeModal('addCustomerModal')">Abbrechen</button>
        <button class="btn btn-primary" id="saveCustBtn">Anlegen</button>
      </div>
    </div>
  </div>
</div>

<style>
.nav-badge { background:var(--danger);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:auto; }
.badge-status{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.03em;text-transform:uppercase}
.badge-status::before{content:'';width:6px;height:6px;border-radius:50%;display:block}
.badge-offen{background:#fef3c7;color:#92400e}.badge-offen::before{background:#d97706}
.badge-in_bearbeitung{background:#dbeafe;color:#1e40af}.badge-in_bearbeitung::before{background:#1d5ec7}
.badge-abgeschlossen{background:#dcfce7;color:#166534}.badge-abgeschlossen::before{background:#53a117}
.case-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all var(--transition);margin-bottom:10px;animation:fadeInUp 0.35s both}
.case-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--primary)}
.sparte-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sparte-hausrat{background:#fef3c7}.sparte-wohngebaeude{background:#dbeafe}.sparte-haftpflicht{background:#dcfce7}.sparte-kfz{background:#ede9fe}.sparte-glas{background:#cffafe}
.unread-dot{width:9px;height:9px;border-radius:50%;background:var(--danger);flex-shrink:0}
.customer-row{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:8px;animation:fadeInUp 0.35s both}
.timeline-entry{position:relative;padding-left:20px;margin-bottom:14px}
.timeline-entry::before{content:'';position:absolute;left:0;top:5px;width:9px;height:9px;border-radius:50%}
.entry-admin::before{background:var(--primary)}
.entry-customer::before{background:var(--muted)}
.timeline-bubble{padding:8px 12px;border-radius:var(--radius-sm);font-size:13px}
.entry-admin .timeline-bubble{background:var(--primary-light);border-left:3px solid var(--primary)}
.entry-customer .timeline-bubble{background:var(--bg-subtle);border-left:3px solid var(--border)}
.msg-bubble{border-radius:var(--radius);padding:8px 12px;max-width:90%;font-size:13px}
.msg-admin{align-self:flex-start;background:var(--bg-subtle)}
.msg-kunde{align-self:flex-end;background:var(--primary);color:#fff}
.doc-item{display:flex;align-items:center;gap:8px;background:var(--bg-subtle);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;margin-bottom:4px}
.doc-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>

<script>
const SPARTE_LABELS = { hausrat:'Hausrat', wohngebaeude:'Wohngebäude', haftpflicht:'Haftpflicht', kfz:'Kfz', glas:'Glas' };
const STATUS_LABELS = { offen:'Offen', in_bearbeitung:'In Bearbeitung', abgeschlossen:'Abgeschlossen' };
const SPARTE_ICONS = {
  hausrat:'<svg viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
  wohngebaeude:'<svg viewBox="0 0 24 24" fill="none" stroke="#1d5ec7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="9" y1="22" x2="9" y2="2"/><line x1="4" y1="7" x2="20" y2="7"/></svg>',
  haftpflicht:'<svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
  kfz:'<svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><rect x="1" y="3" width="15" height="13" rx="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>',
  glas:'<svg viewBox="0 0 24 24" fill="none" stroke="#0891b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/></svg>'
};

let currentCaseId = null;

function showTab(tab, el) {
  document.getElementById('tab-cases').style.display = tab === 'cases' ? '' : 'none';
  document.getElementById('tab-customers').style.display = tab === 'customers' ? '' : 'none';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'customers') loadCustomers();
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.add('hidden'); }));

async function init() {
  try {
    const me = await api('/api/auth/me');
    if (me.role !== 'admin') { window.location.href = '/login.html'; return; }
    document.getElementById('sidebarUser').textContent = me.full_name || me.email;
  } catch { window.location.href = '/login.html'; return; }
  loadCases();
}

async function loadCases() {
  const status = document.getElementById('filterStatus').value;
  const sparte = document.getElementById('filterSparte').value;
  let url = '/api/cases';
  const params = [];
  if (status) params.push('status=' + status);
  if (sparte) params.push('sparte=' + sparte);
  if (params.length) url += '?' + params.join('&');
  try {
    const cases = await api(url);
    const openCount = cases.filter(c => c.status === 'offen').length;
    const badge = document.getElementById('openBadge');
    if (openCount > 0) { badge.textContent = openCount; badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); }
    document.getElementById('casesContainer').innerHTML = cases.length ? cases.map((c,i) => renderCaseCard(c,i)).join('') : '<div class="empty-state"><div class="empty-title">Keine Fälle gefunden</div></div>';
    document.querySelectorAll('.case-card').forEach(el => el.addEventListener('click', () => openCaseDetail(el.dataset.id)));
  } catch(e) { console.error(e); }
}

function renderCaseCard(c, i) {
  const dt = new Date(c.created_at).toLocaleDateString('de-DE');
  const unread = c.unread_messages > 0 ? '<span class="unread-dot"></span>' : '';
  return `<div class="case-card" data-id="${c._id}" style="animation-delay:${i*0.05}s">
    <div class="sparte-icon sparte-${c.sparte}">${SPARTE_ICONS[c.sparte]||''}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:3px;flex-wrap:wrap">
        <span style="font-family:monospace;font-size:11px;color:var(--muted);font-weight:700">${c.case_number}</span>
        <span class="badge-status badge-${c.status}">${STATUS_LABELS[c.status]||c.status}</span>
        ${unread}
      </div>
      <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(c.title)}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:3px">${escHtml(c.customer_name||'—')} · ${SPARTE_LABELS[c.sparte]||c.sparte} · ${dt}</div>
    </div>
  </div>`;
}

async function openCaseDetail(id) {
  currentCaseId = id;
  openModal('caseModal');
  await Promise.all([loadModalCase(), loadModalTimeline(), loadModalDocs(), loadModalMessages()]);
}

async function loadModalCase() {
  const c = await api('/api/cases/' + currentCaseId);
  document.getElementById('modalCaseTitle').textContent = c.title;
  document.getElementById('modalStatusSelect').value = c.status;
  document.getElementById('modalCaseInfo').innerHTML = `
    <span><strong style="color:var(--muted);font-size:11px">FALL</strong> <span style="font-family:monospace;font-weight:700">${c.case_number}</span></span>
    <span><strong style="color:var(--muted);font-size:11px">KUNDE</strong> ${escHtml(c.customer_name||'—')}</span>
    <span><strong style="color:var(--muted);font-size:11px">SPARTE</strong> ${SPARTE_LABELS[c.sparte]||c.sparte}</span>
    <span><strong style="color:var(--muted);font-size:11px">SCHADENSTAG</strong> ${c.damage_date ? new Date(c.damage_date).toLocaleDateString('de-DE') : '—'}</span>
    <span><strong style="color:var(--muted);font-size:11px">KONTAKT</strong> ${escHtml(c.customer_email||'—')} ${c.customer_phone ? '· ' + escHtml(c.customer_phone) : ''}</span>
  `;
  // Notify button
  document.getElementById('modalNotifyBtn').dataset.notification = c.customer_notification || 'email';
  document.getElementById('modalNotifyBtn').dataset.phone = c.customer_phone || '';
}

document.getElementById('modalSaveStatus').addEventListener('click', async () => {
  const status = document.getElementById('modalStatusSelect').value;
  try {
    await api('/api/cases/' + currentCaseId + '/status', { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
    loadCases();
    await loadModalCase();
  } catch(e) { alert('Fehler: ' + e.message); }
});

document.getElementById('modalNotifyBtn').addEventListener('click', async () => {
  const updateText = document.getElementById('modalTimelineInput').value.trim() || 'Ihr Schadensfall wurde aktualisiert.';
  try {
    const r = await api('/api/cases/' + currentCaseId + '/notify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ update_text: updateText }) });
    if (r.method === 'whatsapp' && r.url) { window.open(r.url, '_blank'); }
    else if (r.ok) { alert('E-Mail erfolgreich gesendet.'); }
    else { alert('Fehler: ' + (r.reason || 'Unbekannt')); }
  } catch(e) { alert('Fehler beim Benachrichtigen.'); }
});

async function loadModalTimeline() {
  const entries = await api('/api/cases/' + currentCaseId + '/timeline');
  document.getElementById('modalTimeline').innerHTML = entries.length
    ? entries.map(e => {
        const isAdmin = e.author_role === 'admin';
        const dt = new Date(e.created_at).toLocaleString('de-DE', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        const editBtn = isAdmin ? `<button onclick="editTimelineEntry('${e._id}')" style="margin-left:6px;background:none;border:none;cursor:pointer;color:var(--primary);font-size:11px;padding:0;line-height:1" title="Bearbeiten">✏️</button>` : '';
        return `<div class="timeline-entry ${isAdmin ? 'entry-admin' : 'entry-customer'}" id="tl-${e._id}">
          <div class="timeline-bubble">
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center">${dt} · ${isAdmin ? 'Agentur' : 'Kunde'}${editBtn}</div>
            <div class="tl-text">${escHtml(e.text)}</div>
          </div>
        </div>`;
      }).join('')
    : '<div style="color:var(--muted);font-size:12px">Noch keine Einträge.</div>';
}

function editTimelineEntry(entryId) {
  const entry = document.getElementById('tl-' + entryId);
  if (!entry) return;
  const textEl = entry.querySelector('.tl-text');
  const originalText = textEl ? textEl.textContent : '';
  entry.querySelector('.timeline-bubble').innerHTML = `
    <textarea class="form-control" id="tl-edit-${entryId}" rows="2" style="font-size:12px;margin-bottom:6px">${escHtml(originalText)}</textarea>
    <div style="display:flex;gap:6px">
      <button class="btn btn-primary" style="font-size:12px;padding:4px 10px" onclick="saveTimelineEntry('${entryId}')">Speichern</button>
      <button class="btn btn-secondary" style="font-size:12px;padding:4px 10px" onclick="cancelTimelineEdit()">Abbrechen</button>
    </div>`;
}

async function saveTimelineEntry(entryId) {
  const textarea = document.getElementById('tl-edit-' + entryId);
  if (!textarea) return;
  const text = textarea.value.trim();
  if (!text) return;
  try {
    await api('/api/timeline/' + entryId, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
    await loadModalTimeline();
  } catch(e) { alert('Fehler: ' + e.message); }
}

async function cancelTimelineEdit() { await loadModalTimeline(); }

document.getElementById('modalAddTimeline').addEventListener('click', async () => {
  const text = document.getElementById('modalTimelineInput').value.trim();
  if (!text) return;
  try {
    await api('/api/cases/' + currentCaseId + '/timeline', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
    document.getElementById('modalTimelineInput').value = '';
    await loadModalTimeline();
    loadCases();
  } catch(e) { alert('Fehler: ' + e.message); }
});

async function loadModalDocs() {
  const docs = await api('/api/cases/' + currentCaseId + '/documents');
  document.getElementById('modalDocs').innerHTML = docs.length
    ? docs.map(d => {
        const typeTag = d.doc_type ? `<span style="font-size:10px;background:var(--bg-subtle);padding:1px 5px;border-radius:4px;color:var(--text-secondary);white-space:nowrap">${escHtml(d.doc_type)}</span>` : '';
        return `<a class="doc-item" href="/uploads/documents/${d.filename}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit">
          <span class="doc-item-name">${escHtml(d.original_name)}</span>
          ${typeTag}
          <span style="font-size:10px;color:${d.uploaded_by_role==='admin'?'var(--primary)':'var(--muted)'};">${d.uploaded_by_role==='admin'?'Agentur':'Kunde'}</span>
        </a>`;
      }).join('')
    : '<div style="color:var(--muted);font-size:12px">Keine Dokumente.</div>';
}

document.getElementById('modalDocUpload').addEventListener('change', async function() {
  const docType = document.getElementById('modalDocType').value;
  for (const file of Array.from(this.files)) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('doc_type', docType);
    await fetch('/api/cases/' + currentCaseId + '/documents', { method: 'POST', credentials: 'same-origin', headers: { 'X-Requested-With': 'XMLHttpRequest' }, body: fd });
  }
  this.value = '';
  loadModalDocs();
});

async function loadModalMessages() {
  const msgs = await api('/api/cases/' + currentCaseId + '/messages');
  const container = document.getElementById('modalMessages');
  container.innerHTML = msgs.length
    ? msgs.map(m => {
        const isAdmin = m.author_role === 'admin';
        const dt = new Date(m.created_at).toLocaleString('de-DE', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        return `<div style="display:flex;flex-direction:column;align-items:${isAdmin?'flex-end':'flex-start'}">
          <div class="msg-bubble ${isAdmin?'msg-admin':'msg-kunde'}">
            <div style="font-size:10px;font-weight:700;margin-bottom:3px;opacity:0.7">${escHtml(m.author_name)}</div>
            <div>${escHtml(m.text)}</div>
            <div style="font-size:10px;opacity:0.6;margin-top:3px">${dt}</div>
          </div>
        </div>`;
      }).join('')
    : '<div style="color:var(--muted);font-size:12px">Keine Nachrichten.</div>';
  container.scrollTop = container.scrollHeight;
}

document.getElementById('modalSendMsg').addEventListener('click', sendModalMsg);
document.getElementById('modalMsgInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendModalMsg(); } });
async function sendModalMsg() {
  const text = document.getElementById('modalMsgInput').value.trim();
  if (!text) return;
  try {
    await api('/api/cases/' + currentCaseId + '/messages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
    document.getElementById('modalMsgInput').value = '';
    await loadModalMessages();
  } catch(e) { alert('Fehler: ' + e.message); }
}

// Customers
async function loadCustomers() {
  try {
    const list = await api('/api/admin/customers');
    document.getElementById('customersContainer').innerHTML = list.length
      ? list.map((u,i) => `<div class="customer-row" style="animation-delay:${i*0.04}s">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px">${escHtml(u.full_name)}</div>
            <div style="font-size:12px;color:var(--muted)">${escHtml(u.email)} · ${u.notification_preference === 'whatsapp' ? 'WhatsApp' : 'E-Mail'}</div>
          </div>
          <button class="btn btn-secondary" style="font-size:12px" onclick="resetPw('${u._id}','${escHtml(u.full_name)}')">Passwort zurücksetzen</button>
          <button class="btn" style="font-size:12px;color:var(--danger);border-color:var(--danger)" onclick="deleteCustomer('${u._id}','${escHtml(u.full_name)}')">Löschen</button>
        </div>`).join('')
      : '<div class="empty-state"><div class="empty-title">Keine Kunden angelegt</div></div>';
  } catch(e) {
    document.getElementById('customersContainer').innerHTML = `<div class="empty-state"><div class="empty-title">Fehler beim Laden: ${escHtml(e.message)}</div></div>`;
  }
}

document.getElementById('addCustomerBtn').addEventListener('click', () => {
  document.getElementById('addCustError').classList.add('hidden');
  ['custName','custEmail','custPassword','custPhone','custMobile'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('custNotif').value = 'email';
  openModal('addCustomerModal');
});

document.getElementById('saveCustBtn').addEventListener('click', async () => {
  document.getElementById('addCustError').classList.add('hidden');
  try {
    await api('/api/admin/customers', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        full_name: document.getElementById('custName').value.trim(),
        email: document.getElementById('custEmail').value.trim(),
        password: document.getElementById('custPassword').value,
        phone: document.getElementById('custPhone').value.trim(),
        mobile: document.getElementById('custMobile').value.trim(),
        notification_preference: document.getElementById('custNotif').value
      })
    });
    closeModal('addCustomerModal');
    loadCustomers();
  } catch(e) {
    const b = document.getElementById('addCustError');
    b.textContent = e.message; b.classList.remove('hidden');
  }
});

async function resetPw(id, name) {
  const pw = prompt('Neues Passwort für ' + name + ' (mind. 12 Zeichen):');
  if (!pw) return;
  try {
    await api('/api/admin/customers/' + id + '/password', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) });
    alert('Passwort gesetzt. Kunde muss es beim nächsten Login ändern.');
  } catch(e) { alert('Fehler: ' + e.message); }
}

async function deleteCustomer(id, name) {
  if (!confirm('Kunden "' + name + '" und alle zugehörigen Daten unwiderruflich löschen?')) return;
  try {
    await api('/api/admin/customers/' + id, { method: 'DELETE' });
    loadCustomers();
  } catch(e) { alert('Fehler: ' + e.message); }
}

document.getElementById('navCases').addEventListener('click', () => showTab('cases', document.getElementById('navCases')));
document.getElementById('navCustomers').addEventListener('click', () => showTab('customers', document.getElementById('navCustomers')));
document.getElementById('closeCaseModal').addEventListener('click', () => closeModal('caseModal'));
document.getElementById('filterStatus').addEventListener('change', loadCases);
document.getElementById('filterSparte').addEventListener('change', loadCases);

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin', headers: { 'X-Requested-With': 'XMLHttpRequest' } });
  window.location.href = '/login.html';
});

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function api(url, opts = {}) {
  const res = await fetch(url, { credentials: 'same-origin', ...opts, headers: { 'X-Requested-With': 'XMLHttpRequest', ...(opts.headers||{}) } });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || res.status);
  return data;
}

init();
</script>
</body>
</html>
