<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mein Profil – Schadenportal Schindelhauer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-wrapper">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z" fill="currentColor"/></svg>
      </div>
      <div class="sidebar-company">Schadenportal</div>
      <div class="sidebar-subtitle">Schindelhauer · Continentale</div>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-nav-label">Navigation</div>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Meine Fälle</span>
      </a>
      <a href="case-new.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span>Schaden melden</span>
      </a>
      <a href="profile.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Mein Profil</span>
      </a>
      <a href="change-password.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span>Passwort ändern</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebarUser"></div>
      <button class="sidebar-logout" id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Abmelden</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-header">
      <div>
        <h1 class="page-title">Mein Profil</h1>
        <p class="page-subtitle">Kontaktdaten und Benachrichtigungseinstellungen</p>
      </div>
    </div>

    <div class="card animate-in" style="max-width:560px">
      <div id="successBox" class="alert alert-success hidden" style="margin-bottom:20px"></div>
      <div id="errorBox" class="alert alert-danger hidden" style="margin-bottom:20px"></div>

      <form id="profileForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="fullName">Vollständiger Name</label>
          <input type="text" id="fullName" class="form-control" maxlength="80">
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Telefon</label>
          <input type="tel" id="phone" class="form-control" placeholder="z.B. 0231 1234567">
        </div>
        <div class="form-group">
          <label class="form-label" for="mobile">Mobil</label>
          <input type="tel" id="mobile" class="form-control" placeholder="z.B. 0151 12345678">
        </div>

        <div class="form-group">
          <label class="form-label">Benachrichtigungen</label>
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
            Wie möchten Sie informiert werden, wenn es Neuigkeiten zu Ihrem Schadensfall gibt?
          </p>
          <div style="display:flex;flex-direction:column;gap:8px">
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);transition:all var(--transition)" id="emailLabel">
              <input type="radio" name="notification" value="email" id="notifEmail" style="accent-color:var(--primary)">
              <div>
                <div style="font-weight:600;font-size:14px">Per E-Mail</div>
                <div style="font-size:12px;color:var(--muted)">Sie erhalten eine E-Mail bei jedem Status-Update.</div>
              </div>
            </label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);transition:all var(--transition)" id="waLabel">
              <input type="radio" name="notification" value="whatsapp" id="notifWhatsapp" style="accent-color:var(--primary)">
              <div>
                <div style="font-weight:600;font-size:14px">Per WhatsApp</div>
                <div style="font-size:12px;color:var(--muted)">Der Sachbearbeiter öffnet WhatsApp mit einer vorbereiteten Nachricht an Sie.</div>
              </div>
            </label>
          </div>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:8px">
          <button type="submit" id="saveBtn" class="btn btn-primary">Speichern</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script>
(function() {
  async function init() {
    try {
      const me = await api('/api/auth/me');
      document.getElementById('sidebarUser').textContent = me.full_name || me.email;
      document.getElementById('fullName').value = me.full_name || '';
      document.getElementById('phone').value = me.phone || '';
      document.getElementById('mobile').value = me.mobile || '';
      const pref = me.notification_preference || 'email';
      document.querySelector(`input[name="notification"][value="${pref}"]`).checked = true;
      highlightSelected();
    } catch { window.location.href = '/login.html'; }
  }

  function highlightSelected() {
    document.querySelectorAll('input[name="notification"]').forEach(r => {
      r.closest('label').style.borderColor = r.checked ? 'var(--primary)' : 'var(--border)';
      r.closest('label').style.background = r.checked ? 'var(--primary-light)' : '';
    });
  }
  document.querySelectorAll('input[name="notification"]').forEach(r => r.addEventListener('change', highlightSelected));

  document.getElementById('profileForm').addEventListener('submit', async e => {
    e.preventDefault();
    document.getElementById('successBox').classList.add('hidden');
    document.getElementById('errorBox').classList.add('hidden');
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Speichern…';
    try {
      await api('/api/profile', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          full_name: document.getElementById('fullName').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          mobile: document.getElementById('mobile').value.trim(),
          notification_preference: document.querySelector('input[name="notification"]:checked')?.value || 'email'
        })
      });
      const s = document.getElementById('successBox');
      s.textContent = 'Profil gespeichert.';
      s.classList.remove('hidden');
    } catch (err) {
      const b = document.getElementById('errorBox');
      b.textContent = 'Fehler beim Speichern.';
      b.classList.remove('hidden');
    } finally { btn.disabled = false; btn.textContent = 'Speichern'; }
  });

  async function api(url, opts = {}) {
    const res = await fetch(url, { credentials: 'same-origin', headers: { 'X-Requested-With': 'XMLHttpRequest', ...(opts.headers || {}) }, ...opts });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || res.status);
    return data;
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin', headers: { 'X-Requested-With': 'XMLHttpRequest' } });
    window.location.href = '/login.html';
  });

  init();
})();
</script>
</body>
</html>
